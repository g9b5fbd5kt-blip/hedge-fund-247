<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BEAST">
    <meta name="theme-color" content="#000000">
    <title>BEAST MODE v4.1</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0A0A0A;
            --bg-tertiary: #141414;
            --bg-elevated: #1C1C1E;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --text-tertiary: #48484A;
            --accent-green: #00D395;
            --accent-green-dark: #00B884;
            --accent-red: #FF3B30;
            --accent-red-dark: #D70015;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 4px 16px rgba(0,0,0,0.4);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
            font-size: 17px;
            line-height: 1.4;
            overscroll-behavior: none;
            user-select: none;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ===== HEADER - APPLE HIG ===== */
       .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 0.5px solid var(--border);
            padding: var(--spacing-md) var(--spacing-md) var(--spacing-sm);
        }

       .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
        }

       .app-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-green) 0%, #00FF88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

       .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(0,211,149,0.15);
            border: 1px solid rgba(0,211,149,0.3);
            border-radius: 20px;
        }

       .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

       .status-text {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

       .portfolio-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

       .portfolio-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

       .portfolio-value {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -1px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-feature-settings: 'tnum';
        }

       .portfolio-change {
            font-size: 15px;
            font-weight: 600;
            font-family: 'SF Mono', monospace;
            font-feature-settings: 'tnum';
        }

       .portfolio-change.positive { color: var(--accent-green); }
       .portfolio-change.negative { color: var(--accent-red); }

        /* ===== METRICS - 8PT GRID ===== */
       .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
        }

       .metric-card {
            background: var(--bg-secondary);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

       .metric-card:active {
            transform: scale(0.98);
        }

       .metric-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

       .metric-value {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-family: 'SF Mono', monospace;
            font-feature-settings: 'tnum';
        }

       .metric-value.positive { color: var(--accent-green); }
       .metric-value.negative { color: var(--accent-red); }

       .metric-subtext {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 4px;
            font-weight: 500;
        }

        /* ===== CHART - TRADINGVIEW STYLE ===== */
       .chart-container {
            margin: 0 var(--spacing-md) var(--spacing-md);
            background: var(--bg-secondary);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
        }

       .chart-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: var(--spacing-md);
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

       .chart-symbol-info {
            pointer-events: auto;
        }

       .chart-symbol {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

       .chart-price {
            font-size: 28px;
            font-weight: 700;
            font-family: 'SF Mono', monospace;
            font-feature-settings: 'tnum';
            letter-spacing: -1px;
        }

       .chart-change {
            font-size: 14px;
            font-weight: 600;
            font-family: 'SF Mono', monospace;
            margin-top: 2px;
        }

       .chart-change.positive { color: var(--accent-green); }
       .chart-change.negative { color: var(--accent-red); }

       .timeframe-selector {
            display: flex;
            gap: 6px;
            pointer-events: auto;
        }

       .tf-button {
            padding: 8px 14px;
            background: rgba(28,28,30,0.8);
            backdrop-filter: blur(20px);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

       .tf-button:active {
            transform: scale(0.95);
        }

       .tf-button.active {
            color: var(--accent-green);
            border-color: var(--accent-green);
            background: rgba(0,211,149,0.15);
        }

        #chart {
            width: 100%;
            height: 320px;
        }

        /* ===== AGENT SIGNALS - CLEAN CARDS ===== */
       .agents-section {
            padding: 0 var(--spacing-md) var(--spacing-md);
        }

       .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--spacing-sm);
            padding: 0 4px;
        }

       .agents-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-sm);
        }

       .agent-card {
            background: var(--bg-secondary);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            text-align: center;
            transition: all 0.2s;
        }

       .agent-card:active {
            transform: scale(0.98);
        }

       .agent-card.active {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 1px var(--accent-green);
        }

       .agent-icon {
            font-size: 28px;
            margin-bottom: var(--spacing-xs);
        }

       .agent-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

       .agent-signal {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

       .agent-signal.buy { color: var(--accent-green); }
       .agent-signal.sell { color: var(--accent-red); }
       .agent-signal.hold { color: var(--text-tertiary); }

       .agent-confidence {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 4px;
            font-weight: 500;
        }

        /* ===== TRADE PANEL - THUMB ZONE ===== */
       .trade-panel {
            margin: 0 var(--spacing-md) var(--spacing-md);
            background: var(--bg-secondary);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
        }

       .segmented-control {
            display: flex;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 2px;
            margin-bottom: var(--spacing-md);
        }

       .segment {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

       .segment:active {
            transform: scale(0.98);
        }

       .segment.active {
            background: var(--bg-elevated);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

       .amount-input-wrapper {
            position: relative;
            margin-bottom: var(--spacing-md);
        }

       .amount-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--spacing-xs);
        }

       .amount-input {
            width: 100%;
            padding: 16px;
            background: var(--bg-tertiary);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 600;
            font-family: 'SF Mono', monospace;
            font-feature-settings: 'tnum';
            outline: none;
            transition: all 0.2s;
        }

       .amount-input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(0,211,149,0.1);
        }

       .quick-amounts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-xs);
            margin-bottom: var(--spacing-md);
        }

       .quick-amount-btn {
            padding: 12px;
            background: var(--bg-tertiary);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

       .quick-amount-btn:active {
            transform: scale(0.95);
            background: var(--bg-elevated);
        }

       .trade-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-sm);
        }

       .trade-button {
            padding: 18px;
            border-radius: var(--radius-md);
            border: none;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

       .trade-button:active {
            transform: scale(0.96);
        }

       .buy-button {
            background: linear-gradient(135deg, var(--accent-green) 0%, var(--accent-green-dark) 100%);
            color: #000;
            box-shadow: 0 4px 16px rgba(0,211,149,0.3);
        }

       .sell-button {
            background: linear-gradient(135deg, var(--accent-red) 0%, var(--accent-red-dark) 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(255,59,48,0.3);
        }

        /* ===== POSITIONS LIST ===== */
       .positions-section {
            padding: 0 var(--spacing-md) 100px;
        }

       .position-card {
            background: var(--bg-secondary);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            transition: all 0.2s;
        }

       .position-card:active {
            transform: scale(0.99);
        }

       .position-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
        }

       .position-symbol {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

       .position-side {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

       .position-side.long {
            background: rgba(0,211,149,0.15);
            color: var(--accent-green);
        }

       .position-side.short {
            background: rgba(255,59,48,0.15);
            color: var(--accent-red);
        }

       .position-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-sm);
        }

       .position-stat {
            text-align: center;
        }

       .position-stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            font-weight: 600;
        }

       .position-stat-value {
            font-size: 15px;
            font-weight: 600;
            font-family: 'SF Mono', monospace;
            font-feature-settings: 'tnum';
        }

       .position-pnl.positive { color: var(--accent-green); }
       .position-pnl.negative { color: var(--accent-red); }

        /* ===== EMERGENCY STOP - FAB ===== */
       .emergency-fab {
            position: fixed;
            bottom: calc(24px + env(safe-area-inset-bottom));
            right: var(--spacing-md);
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: linear-gradient(135deg, var(--accent-red) 0%, var(--accent-red-dark) 100%);
            border: none;
            box-shadow: 0 8px 24px rgba(255,59,48,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 999;
        }

       .emergency-fab:active {
            transform: scale(0.9);
        }

        /* ===== TOAST NOTIFICATIONS ===== */
       .toast {
            position: fixed;
            top: calc(100px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(28,28,30,0.95);
            backdrop-filter: blur(20px);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--spacing-md) var(--spacing-lg);
            font-size: 15px;
            font-weight: 600;
            z-index: 10000;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

       .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

       .toast.success { border-color: var(--accent-green); color: var(--accent-green); }
       .toast.error { border-color: var(--accent-red); color: var(--accent-red); }

        /* ===== EMPTY STATE ===== */
       .empty-state {
            text-align: center;
            padding: 48px var(--spacing-md);
            color: var(--text-secondary);
        }

       .empty-state-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
            opacity: 0.3;
        }

       .empty-state-text {
            font-size: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="app-title">BEAST v4.0</div>
            <div class="status-badge" id="statusBadge">
                <div class="status-dot"></div>
                <div class="status-text">LIVE</div>
            </div>
        </div>
        <div class="portfolio-section">
            <div>
                <div class="portfolio-label">Portfolio</div>
                <div class="portfolio-value" id="portfolioValue">$1,007.00</div>
            </div>
            <div class="portfolio-change positive" id="portfolioChange">+$0.00 (+0.00%)</div>
        </div>
    </div>

    <div class="metrics">
        <div class="metric">
            <div class="metric-label">Portfolio</div>
            <div class="metric-value" id="metricPortfolio">$1,007</div>
            <div class="metric-subtext">Total Value</div>
        </div>
        <div class="metric">
            <div class="metric-label">Cash</div>
            <div class="metric-value" id="metricCash">$1,007</div>
            <div class="metric-subtext">Available</div>
        </div>
        <div class="metric">
            <div class="metric-label">Day P&L</div>
            <div class="metric-value positive" id="metricPnL">+$0.00</div>
            <div class="metric-subtext">Today</div>
        </div>
        <div class="metric">
            <div class="metric-label">Win Rate</div>
            <div class="metric-value" id="metricWR">0%</div>
            <div class="metric-subtext">All Time</div>
        </div>
    </div>

    <div class="chart-container">
        <div class="chart-header">
            <div class="chart-symbol-info">
                <select class="chart-symbol" id="symbolSelect" onchange="changeSymbol(this.value)">
                    <option value="BTC/USD">BTC/USD</option>
                    <option value="ETH/USD">ETH/USD</option>
                    <option value="SOL/USD">SOL/USD</option>
                    <option value="SPY">SPY</option>
                    <option value="QQQ">QQQ</option>
                    <option value="AAPL">AAPL</option>
                    <option value="TSLA">TSLA</option>
                </select>
                <div class="chart-price" id="chartPrice">$0.00</div>
                <div class="chart-change positive" id="chartChange">+0.00%</div>
            </div>
            <div class="timeframe-selector">
                <button class="tf-button" data-tf="1m">1m</button>
                <button class="tf-button" data-tf="5m">5m</button>
                <button class="tf-button active" data-tf="1h">1h</button>
                <button class="tf-button" data-tf="1d">1d</button>
            </div>
        </div>
        <div id="chart"></div>
    </div>

    <div class="agents-section">
        <div class="section-title">AI Agents</div>
        <div class="agents-grid">
            <div class="agent-card" id="agentMomentum">
                <div class="agent-icon">🚀</div>
                <div class="agent-name">Momentum</div>
                <div class="agent-signal hold" id="agentMomentumSignal">HOLD</div>
                <div class="agent-confidence" id="agentMomentumConf">50%</div>
            </div>
            <div class="agent-card" id="agentReversion">
                <div class="agent-icon">🎯</div>
                <div class="agent-name">Reversion</div>
                <div class="agent-signal hold" id="agentReversionSignal">HOLD</div>
                <div class="agent-confidence" id="agentReversionConf">50%</div>
            </div>
            <div class="agent-card" id="agentBreakout">
                <div class="agent-icon">⚡</div>
                <div class="agent-name">Breakout</div>
                <div class="agent-signal hold" id="agentBreakoutSignal">HOLD</div>
                <div class="agent-confidence" id="agentBreakoutConf">50%</div>
            </div>
            <div class="agent-card" id="agentSentiment">
                <div class="agent-icon">🧠</div>
                <div class="agent-name">Sentiment</div>
                <div class="agent-signal hold" id="agentSentimentSignal">HOLD</div>
                <div class="agent-confidence" id="agentSentimentConf">50%</div>
            </div>
        </div>
    </div>

    <div class="trade-panel">
        <div class="segmented-control">
            <button class="segment active" data-mode="market">Market</button>
            <button class="segment" data-mode="limit">Limit</button>
        </div>
        <div class="amount-input-wrapper">
            <div class="amount-label">Amount (USD)</div>
            <input type="number" class="amount-input" id="tradeAmount" placeholder="100" value="100" inputmode="decimal">
        </div>
        <div class="quick-amounts">
            <button class="quick-amount-btn" data-amount="25">25</button>
            <button class="quick-amount-btn" data-amount="50">50</button>
            <button class="quick-amount-btn" data-amount="100">100</button>
            <button class="quick-amount-btn" data-amount="250">250</button>
        </div>
        <div class="trade-actions">
            <button class="trade-button buy-button" id="buyButton">BUY</button>
            <button class="trade-button sell-button" id="sellButton">SELL</button>
        </div>
    </div>

    <div class="positions-section">
        <div class="section-title">Open Positions</div>
        <div id="positionsContainer"></div>
    </div>

    <button class="emergency-fab" id="emergencyStop">🛑</button>
    <div class="toast" id="toast"></div>

    <script>
        // State Management
        let chart, candleSeries;
        let currentSymbol = 'BTC/USD';
        let currentTF = '1h';
        let tradeMode = 'market';
        let portfolioData = { capital: 1007, dailyPnL: 0, positions: [] };

        // Haptic Feedback
        function haptic(type = 'light') {
            if (navigator.vibrate) {
                const patterns = {
                    light: 10,
                    medium: 20,
                    heavy: 30,
                    success: [10, 50, 10],
                    error: [50, 100, 50]
                };
                navigator.vibrate(patterns[type] || patterns.light);
            }
        }

        // Initialize Chart
        function initChart() {
            const chartContainer = document.getElementById('chart');
            chart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth,
                height: 320,
                layout: {
                    background: { color: '#000000' },
                    textColor: '#8E8E93',
                },
                grid: {
                    vertLines: { color: '#1C1C1E' },
                    horzLines: { color: '#1C1C1E' },
                },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: '#1C1C1E' },
                timeScale: {
                    borderColor: '#1C1C1E',
                    timeVisible: true,
                    secondsVisible: false,
                },
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#00D395',
                downColor: '#FF3B30',
                borderUpColor: '#00D395',

            });

            generateDemoData();

                chart.applyOptions({ width: chartContainer.clientWidth });

        }

        // Demo Data Generation
        function generateDemoData() {
            const data = [];
            let price = currentSymbol.includes('BTC')? 65000 : currentSymbol.includes('ETH')? 3500 : 100;
            const now = Date.now() / 1000;

            for (let i = 100; i >= 0; i--) {
                const time = now - i * 3600;
                const change = (Math.random() - 0.5) * price * 0.02;
                const open = price;
                const close = price + change;
                const high = Math.max(open, close) + Math.random() * Math.abs(change);
                const low = Math.min(open, close) - Math.random() * Math.abs(change);

                data.push({ time, open, high, low, close });
                price = close;
            }

            candleSeries.setData(data);
            document.getElementById('chartPrice').textContent = '$' + price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            const change = (Math.random() - 0.3) * 5;
            document.getElementById('chartChange').textContent = (change >= 0? '+' : '') + change.toFixed(2) + '%';
            document.getElementById('chartChange').className = 'chart-change ' + (change >= 0? 'positive' : 'negative');
        }

                const res = await fetch('/api/status');
                const data = await res.json();
                
                portfolioData = data;
                
                document.getElementById('portfolioValue').textContent = '$' + data.capital.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                document.getElementById('metricPortfolio').textContent = '$' + data.capital.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
                document.getElementById('metricCash').textContent = '$' + data.capital.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
                
                const pnl = data.daily_pnl || 0;
                const pnlPct = data.capital > 0? (pnl / data.capital * 100) : 0;
                document.getElementById('metricPnL').textContent = (pnl >= 0? '+' : '') + '$' + pnl.toFixed(2);
                document.getElementById('metricPnL').className = 'metric-value ' + (pnl >= 0? 'positive' : 'negative');
                document.getElementById('portfolioChange').textContent = (pnl >= 0? '+' : '') + '$' + pnl.toFixed(2) + ' (' + (pnl >= 0? '+' : '') + pnlPct.toFixed(2) + '%)';
                document.getElementById('portfolioChange').className = 'portfolio-change ' + (pnl >= 0? 'positive' : 'negative');
                
                document.getElementById('metricWR').textContent = data.stats.wr + '%';
                
                updatePositions(data.positions);
                updateAgents();
                
            } catch (e) {
                console.error('Fetch error:', e);
            }
        }
