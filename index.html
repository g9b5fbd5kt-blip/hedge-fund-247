<!DOCTYPE html><html><head><title>Beast</title><meta name="viewport" content="width=device-width,initial-scale=1"><script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script><style>body{margin:0;background:#0a0e14;color:#fff;font-family:system-ui}.h{height:50px;background:#141b22;display:flex;align-items:center;padding:0 15px;justify-content:space-between;border-bottom:1px solid #222}.logo{color:#00d395;font-weight:700}.s{display:flex;gap:12px;font-size:12px}.m{display:grid;grid-template-columns:180px 1fr 240px;height:calc(100vh - 50px)}.sb{background:#0f1419;padding:8px;overflow:auto;border-right:1px solid #222}.wi{padding:8px;margin-bottom:4px;border-radius:4px;cursor:pointer;font-size:12px}.wi:hover{background:#1a2332}.wi.a{background:#00d39520;border-left:2px solid #00d395}.cc{background:#0a0e14;position:relative}#c{width:100%;height:100%}.rp{background:#0f1419;border-left:1px solid #222;padding:10px;overflow:auto}.pt{font-size:10px;color:#888;text-transform:uppercase;margin-bottom:8px}</style></head><body><div class="h"><div class="logo">BEAST v7</div><div class="s"><div>CAP<b id="cap" style="color:#00d395;margin-left:4px">$1005</b></div><div>P&L<b id="pnl" style="color:#00d395;margin-left:4px">+$0</b></div></div><div class="m"><div class="sb"><div class="pt">Symbols</div><div id="wl"></div></div><div class="cc"><div id="c"></div></div><div class="rp"><div class="pt">Status</div><div style="font-size:12px">Bot: <span style="color:#00d395">RUNNING</span></div><div style="font-size:12px;margin-top:8px">Trades: <span id="tr">0</span></div><div style="font-size:12px">AI: <span id="ai">Learning</span></div></div></div><script>const s=[{n:'BTC/USD',p:43250},{n:'ETH/USD',p:2245},{n:'SOL/USD',p:98},{n:'SPY',p:475},{n:'QQQ',p:408},{n:'TSLA',p:242},{n:'NVDA',p:875}];const w=document.getElementById('wl');s.forEach((x,i)=>{const d=document.createElement('div');d.className='wi'+(i==0?' a':'');d.innerHTML=`<div>${x.n}</div><div style="font-size:11px;color:#888">$${x.p}</div>`;d.onclick=()=>{document.querySelectorAll('.wi').forEach(y=>y.classList.remove('a'));d.classList.add('a')};w.appendChild(d)});const chart=LightweightCharts.createChart(document.getElementById('c'),{layout:{background:{color:'#0a0e14'},textColor:'#fff'},width:document.getElementById('c').clientWidth,height:document.getElementById('c').clientHeight});const cs=chart.addCandlestickSeries();const d=[];let b=43250;for(let i=0;i<50;i++){const o=b+(Math.random()-0.5)*500;const c=o+(Math.random()-0.5)*300;d.push({time:Date.now()/1000-3600*(50-i),open:o,high:o+200,low:o-200,close:c});b=c}cs.setData(d);setInterval(async()=>{try{const r=await fetch('/api/status');const j=await r.json();document.getElementById('cap').textContent='$'+Math.round(j.capital);document.getElementById('pnl').textContent=(j.daily_pnl>=0?'+':'')+'$'+j.daily_pnl.toFixed(0);document.getElementById('tr').textContent=j.stats.total}catch(e){}},5000)</script></body></html>
